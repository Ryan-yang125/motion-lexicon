<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("motion-lexicon-theme:v1") || localStorage.getItem("motion-lexicon-theme");
          const mode = saved === "light" || saved === "dark" || saved === "system" ? saved : "system";
          const resolved = mode === "system"
            ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeMode = mode;
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.dataset.themeMode = "system";
        }
      })();
    </script>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Motion Lexicon</title>
    <meta
      name="description"
      content="Motion Lexicon helps people browse animation vocabulary, tune parameters, and copy agent-ready prompts plus HTML/CSS."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
