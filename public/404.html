<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Page not found | Motion Lexicon</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --ink: #0a0a0a;
        --dim: #737373;
        --line: #e5e5e5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: var(--bg);
        font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(36rem, 100%);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 3rem;
        line-height: 1;
      }

      p {
        margin: 0 0 1.5rem;
        color: var(--dim);
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--ink);
        border-radius: 6px;
        padding: 0 0.9rem;
        color: var(--bg);
        background: var(--ink);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>This Motion Lexicon page does not exist. Return to the catalog to keep browsing animation vocabulary.</p>
      <a href="/zh/catalog/">Open catalog</a>
    </main>
  </body>
</html>
