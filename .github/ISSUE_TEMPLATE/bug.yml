name: Bug report
description: Report a reproducible product, content, accessibility, or tooling defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping Motion Lexicon stay reliable.
  - type: textarea
    id: outcome
    attributes:
      label: What happened?
      description: Include the current result and the result you expected.
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or command
      placeholder: /en/entrances/slide-in/ or npx motion-lexicon show slide-in
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: List the smallest sequence that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, operating system, Node version, locale, and reduced-motion setting when relevant.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, recordings, logs, or a minimal repository.
